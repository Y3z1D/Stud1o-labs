<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TwinVault Demos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #050810;
      color: #e5f7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 0.5rem;
      text-shadow: 0 0 12px #00ff9d;
    }
    p {
      margin-bottom: 1.5rem;
      color: #9fb3c8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      max-width: 600px;
      width: 100%;
    }
    a {
      display: block;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      color: #e5f7ff;
      background: #0b1220;
      border: 1px solid #00ff9d55;
      box-shadow: 0 0 10px #00ff9d33;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 16px #00ff9d88;
      border-color: #00ff9d;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>Welcome to TwinVault Demos</h1>
  <p>Select a demo environment to open:</p>

 <div class="grid">
    <a href="./Demo_1/index.html">Demo 1</a>
    <a href="./Demo_2/index.html">Demo 2</a>
    <a href="./Demo_3/index.html">Demo 3</a>
    <a href="./Demo_4/index.html">Demo 4</a>
    <a href="./Demo_5/index.html">Demo 5</a>
    <a href="./Demo_6/index.html">Demo 6</a>
    <a href="./Demo_7/index.html">Demo 7</a>
  </div>

  <div class="footer">
    TwinVault · Live Demo Environment
  </div>
</body>
</html>
